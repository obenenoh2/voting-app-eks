name: Test Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Vote image
      run: |
        docker build -t test-vote:latest ./vote

    - name: Build Result image
      run: |
        docker build -t test-result:latest ./result

    - name: Build Worker image
      run: |
        docker build -t test-worker:latest ./worker
