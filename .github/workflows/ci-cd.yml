name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Vote image
      uses: docker/build-push-action@v5
      with:
        context: ./vote
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/vote:latest

    - name: Build and push Result image
      uses: docker/build-push-action@v5
      with:
        context: ./result
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/result:latest

    - name: Build and push Worker image
      uses: docker/build-push-action@v5
      with:
        context: ./worker
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/worker:latest

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name eks-kingsly --region eu-central-1

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/
        kubectl rollout status deployment/vote
        kubectl rollout status deployment/result
        kubectl rollout status deployment/worker
