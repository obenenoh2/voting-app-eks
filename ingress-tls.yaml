apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: voting-app-ingress-tls
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - vote.kingsly.eks.ironlabs.online
    secretName: vote-tls-secret
  rules:
  - host: vote.kingsly.eks.ironlabs.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vote
            port:
              number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: result-ingress-tls
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - result.kingsly.eks.ironlabs.online
    secretName: result-tls-secret
  rules:
  - host: result.kingsly.eks.ironlabs.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: result
            port:
              number: 80
